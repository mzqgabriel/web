name: Build Website

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm run build

      - run: zip -r dist.zip dist

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist.zip
